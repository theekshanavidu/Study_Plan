<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update - Study Plan</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px;
            border-radius: 24px;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 26px; margin-bottom: 15px; color: #60a5fa; }
        p { font-size: 16px; color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        
        .btn {
            background: #2563eb;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 18px;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }
        .footer-text { margin-top: 25px; font-size: 13px; color: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        
        <h1>පද්ධතිය නඩත්තු වෙමින් පවතී</h1>
        <h2>System Under Maintenance</h2>
        
        <p>අපගේ වෙබ් අඩවිය වඩාත් හොඳින් යාවත්කාලීන කරමින් පවතින බැවින්, කරුණාකර පහත බොත්තම ක්ලික් කර අපගේ තාවකාලික සබැඳිය වෙත පිවිසෙන්න.</p>

        <a href="https://theekshanavidu.github.io/Study-test/" class="btn">නව වෙබ් අඩවියට පිවිසෙන්න</a>

        <div class="footer-text">
            ඔබේ පද්ධති මතකය (Cache) ස්වයංක්‍රීයව පිරිසිදු කර ඇත.
        </div>
    </div>

    <script>
        // පරණ මතකය (Cache) ඉවත් කිරීමේ Script එක
        (async function() {
            try {
                // Service Workers ඉවත් කිරීම
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (let r of regs) await r.unregister();
                }
                // Cache Storage මකා දැමීම
                if ('caches' in window) {
                    const names = await caches.keys();
                    for (let n of names) await caches.delete(n);
                }
            } catch (e) { console.log("Cache clear failed", e); }
        })();
    </script>

</body>
</html>
