<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updating - Study Plan</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .icon { font-size: 50px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #60a5fa; }
        h2 { font-size: 20px; margin-bottom: 20px; font-weight: 500; }
        p { font-size: 15px; color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            background: #2563eb;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4); }
        .loader {
            margin-top: 30px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚀</div>
        
        <h1>පද්ධතිය යාවත්කාලීන වේ</h1>
        <p>අපගේ පද්ධතිය නඩත්තු කරමින් පවතින බැවින්, කරුණාකර අපගේ අලුත් ලින්ක් එක භාවිතා කරන්න.</p>

        <hr style="opacity: 0.1; margin: 20px 0;">

        <h2>System Updating</h2>
        <p>We're performing some maintenance. Please use the temporary link below to access your study plan.</p>

        <a href="https://theekshanavidu.github.io/Study-test/" class="btn">Go to Study Plan</a>

        <div class="loader">
            Cleaning cache and redirecting...
        </div>
    </div>

    <script>
       // බලෙන්ම පරණ දත්ත මකා දැමීම
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for(let reg of regs) reg.unregister();
            });
        }

        // Redirect logic: තත්පර 10කින් අලුත් පේජ් එකට යොමු කරයි
        setTimeout(() => {
            window.location.href = "https://theekshanavidu.github.io/Study-test/";
        }, 10000);
    </script>
</body>
</html>
