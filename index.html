<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="J0l55wJ4YIqdkT85F1QcYDNMLgpdgYnwc28UBJkswdc" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudyTracker Pro - Antigravity Edition">
    <title>StudyTracker</title>

    <!-- DNS Preconnects for ultra-fast network loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <link rel="icon" type="image/png" href="Icon 1.png">
    
    <!-- Inline Critical CSS vs Deferred Styles if applicable, but style.css is local -->
    <link rel="stylesheet" href="style.css">

    <!-- External Libraries (Deferred so HTML parsing isn't blocked) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js" defer></script>
</head>

<body class="bg-dark text-white">

    <div id="root" class="flex flex-col min-h-screen">
        <!-- App Header will be rendered here -->
        <header id="app-header" class="glass-panel sticky top-0 z-50 flex justify-between items-center px-8 py-4 mb-8">
            <h1 class="text-2xl font-outfit font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 cursor-pointer"
                onclick="window.location.hash='#/home'">
                StudyTracker
            </h1>
            <div id="header-actions" class="flex gap-4 items-center">
                <!-- Nav buttons will be injected -->
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="app-container" class="container mx-auto px-4 pb-20 flex-grow">
            <!-- Dynamic Content -->
        </main>

        <!-- Subtle Background Copyright -->
        <div
            class="fixed bottom-4 left-0 w-full text-center text-xs text-[var(--text-secondary)] opacity-40 pointer-events-none z-0">
            &copy; 2026 StudyTracker Pro. All rights reserved.
            &nbsp;|&nbsp;
        </div>

        <!-- Floating Elements -->
        <div id="floating-modal" class="hidden relative z-50"></div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
